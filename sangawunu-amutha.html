<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>සැඟවුණු අමුත්තා (Treasure Found!)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; overflow: hidden; background-color: #050505; }
        .glow-text { text-shadow: 0 0 15px rgba(253, 224, 71, 0.6), 0 0 30px rgba(234, 88, 12, 0.4); }
        .chest-glow { filter: drop-shadow(0 0 40px rgba(234, 179, 8, 0.5)); }
        
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(234,88,12,0.2) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            animation: pulse-ring 4s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4 relative text-center">
    <a href="index" style="position: fixed; top: 16px; left: 16px; z-index: 9999; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,215,0,0.4); color: #FFD700; padding: 8px 16px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-family: sans-serif; cursor: pointer; transition: background 0.3s;" onmouseover="this.style.background='rgba(255,215,0,0.2)'" onmouseout="this.style.background='rgba(0,0,0,0.7)'">
        ◀ මෙනුව
    </a>
    
    <!-- Background effects -->
    <div class="pulse-ring" style="animation-delay: 0s;"></div>
    <div class="pulse-ring" style="animation-delay: 2s;"></div>
    
    <div class="absolute inset-0 z-0 bg-[url('start.png')] bg-cover bg-center opacity-20 mix-blend-screen"></div>

    <script>
        const REQUIRED_LEVEL = 5;
        try {
            const level = parseInt(localStorage.getItem('th_level') || '0');
            if (level < REQUIRED_LEVEL) {
                window.location.href = 'treasure-hunt';
            }
        } catch(e) {}
    </script>

    <div class="relative z-10 flex flex-col items-center w-full max-w-2xl px-4">
        
        <div class="text-7xl md:text-9xl mb-4 chest-glow animate-pulse">🎁</div>
        
        <h1 class="text-5xl md:text-7xl lg:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-yellow-400 to-orange-600 mb-4 glow-text tracking-wide whitespace-nowrap">
            ජය වේවා!
        </h1>
        
        <p class="text-xl md:text-3xl text-yellow-200 font-bold mb-10 tracking-widest uppercase border-y border-yellow-500/30 py-2 inline-block">
            අමුත්තා හමුවිය
        </p>

        <div class="bg-black/40 backdrop-blur-xl border-2 border-yellow-500/40 rounded-3xl p-6 md:p-10 mb-10 shadow-[0_0_50px_rgba(234,88,12,0.2)] w-full">
            <div class="flex flex-col sm:flex-row justify-between items-center sm:items-end gap-6 sm:gap-0">
                
                <div class="text-center sm:text-left">
                    <p class="text-sm md:text-base text-gray-400 uppercase tracking-widest mb-1 font-bold">ගවේෂකයා</p>
                    <p id="pName" class="text-3xl md:text-4xl text-amber-400 font-black truncate max-wxs">---</p>
                </div>
                
                <div class="hidden sm:block w-px h-16 bg-gradient-to-b from-transparent via-yellow-500/50 to-transparent"></div>
                
                <div class="text-center sm:text-right">
                    <p class="text-sm md:text-base text-gray-400 uppercase tracking-widest mb-1 font-bold">ගතවූ කාලය</p>
                    <p id="pTime" class="text-4xl md:text-5xl text-green-400 font-black font-mono">00:00</p>
                </div>
                
            </div>
        </div>

        <button onclick="resetGame()" class="group relative px-8 py-4 bg-transparent overflow-hidden rounded-full transition-all">
            <div class="absolute inset-0 bg-gradient-to-r from-orange-600 to-red-600 opacity-80 group-hover:opacity-100 transition-opacity"></div>
            <div class="relative flex items-center justify-center gap-3 text-white font-bold text-xl md:text-2xl drop-shadow-md">
                <span>නැවත මුල් පිටුවට</span>
                <span class="group-hover:translate-x-1 transition-transform">↩</span>
            </div>
            <!-- glowing border equivalent -->
            <div class="absolute inset-0 border-2 border-yellow-400/50 rounded-full group-hover:border-yellow-300 transition-colors"></div>
        </button>
    </div>

    <script>
        let startTimeStr = null;
        let pName = 'අමුත්තා';
        
        try { new Audio('sagawunu.wav').play(); } catch(e) {}

        try {
            startTimeStr = localStorage.getItem('th_start_time');
            pName = localStorage.getItem('th_player_name') || 'අමුත්තා';
        } catch(e) {}
        
        document.getElementById('pName').innerText = pName;

        if (startTimeStr) {
            const startTime = parseInt(startTimeStr);
            // End time is essentially now when this screen is first painted!
            const elapsedMs = Date.now() - startTime;
            
            const totalSeconds = Math.floor(elapsedMs / 1000);
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            
            const timeFormatted = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            document.getElementById('pTime').innerText = timeFormatted;
        }

        function resetGame() {
            localStorage.removeItem('th_level'); // clear to reset
            // We use parent location because the game is inside an iframe on index.html
            window.location.href = 'index';
        }

        // Fire Confetti explosion over 5 seconds
        const duration = 5000;
        const end = Date.now() + duration;
        const colors = ['#facc15', '#fbbf24', '#f59e0b', '#ea580c', '#ef4444', '#b91c1c'];

        (function frame() {
            confetti({
                particleCount: 8,
                angle: 60,
                spread: 70,
                origin: { x: 0, y: 0.8 },
                colors: colors,
                zIndex: 100
            });
            confetti({
                particleCount: 8,
                angle: 120,
                spread: 70,
                origin: { x: 1, y: 0.8 },
                colors: colors,
                zIndex: 100
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    </script>
<footer style="position: fixed; bottom: 0; left: 0; right: 0; text-align: center; padding: 8px; font-family: sans-serif; font-size: 0.8rem; color: white; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 9998; pointer-events: auto;">
    Developed by <a href="https://janiruhansaga.com/" target="_blank" style="color: #FFD700; text-decoration: none; font-weight: bold;">JAniruhansaga</a>
</footer>
</body>
</html>
