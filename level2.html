<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>දෙවන අදියර - කුේතනය (Encryption)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: monospace; overflow: hidden; background-color: #050505; color: #0f0; margin:0; }
        .matrix-bg {
            position: absolute; top:0; left:0; right:0; bottom:0; opacity: 0.15;
            background-image: linear-gradient(0deg, transparent 24%, rgba(32, 255, 32, 0.3) 25%, rgba(32, 255, 32, 0.3) 26%, transparent 27%, transparent 74%, rgba(32, 255, 32, 0.3) 75%, rgba(32, 255, 32, 0.3) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(32, 255, 32, 0.3) 25%, rgba(32, 255, 32, 0.3) 26%, transparent 27%, transparent 74%, rgba(32, 255, 32, 0.3) 75%, rgba(32, 255, 32, 0.3) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4 md:p-6 text-center relative">
    <a href="index" style="position: fixed; top: 16px; left: 16px; z-index: 9999; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,215,0,0.4); color: #FFD700; padding: 8px 16px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-family: sans-serif; cursor: pointer; transition: background 0.3s;" onmouseover="this.style.background='rgba(255,215,0,0.2)'" onmouseout="this.style.background='rgba(0,0,0,0.7)'">
        ◀ මෙනුව
    </a>
    <script>
        const REQUIRED_LEVEL = 2;
        try {
            if(parseInt(localStorage.getItem('th_level')||'0') < REQUIRED_LEVEL) window.location.href = 'treasure-hunt';
        } catch(e) {}
    </script>
    
    <div class="matrix-bg"></div>
    
    <div class="relative z-10 border border-green-500/50 p-6 md:p-10 rounded-2xl bg-black/90 shadow-[0_0_50px_rgba(34,197,94,0.3)] max-w-lg w-full">
        <h2 class="text-2xl md:text-3xl font-black mb-8 text-white tracking-[0.2em]">[SYSTEM ENCRYPTED]</h2>
        
        <p class="mb-4 text-green-400 font-bold text-lg md:text-xl border-b border-green-900 pb-4 inline-block">Base64 Decode අභියෝගය!</p>
        <p class="mb-8 opacity-80 text-sm md:text-base leading-relaxed" id="hint-text">
            පද්ධතිය ආරක්ෂිතයි. පහත රහස් කේතය (Base64) විකේතනය (Decode) කර ඊළඟ පිටුවට යා යුතු මාර්ගය සොයාගන්න.<br>
            <span class="text-blue-400 bg-blue-900/30 px-4 py-3 rounded-lg mt-6 inline-block tracking-[0.1em] font-bold border border-blue-500/30 break-all select-all">bGV2ZWwz</span>
        </p>
        
        <!-- Mobile/PC Fallback Terminal -->
        <div class="mt-10 text-left border-t border-green-500/30 pt-6">
            <p class="text-xs text-zinc-500 mb-3">// Enter Target Path Here:</p>
            <div class="bg-black p-4 rounded-xl border border-zinc-800 flex items-center shadow-[inset_0_0_15px_rgba(0,0,0,1)] hover:border-green-500/50 transition-colors">
                <span class="text-green-500 font-black mr-4 text-xl">></span>
                <input type="text" id="terminal-input" class="bg-transparent border-none outline-none text-green-300 w-full placeholder-zinc-700 tracking-wide font-bold text-lg" placeholder="decode and type..." autocomplete="off">
            </div>
        </div>
    </div>

    <!-- SECRET COMMENT FOR DEVTOOLS:
         Try using atob('bGV2ZWwz') in the console!
    -->
    
    <script>
        console.log("%c[ ENCRYPTION ENGAGED ]\n%cTry using %catob('bGV2ZWwz')%c to find the path in this terminal.", "color: red; font-size: 20px;", "color: lightgreen;", "color: yellow; font-size: 16px; font-weight:bold;", "color: lightgreen;");
        
        try { localStorage.setItem('th_level', '3'); } catch(e) {} 

        document.getElementById('terminal-input').addEventListener('input', function(e) {
            const val = this.value.trim().toLowerCase();
            if (val === 'level3') {
                this.readOnly = true;
                this.value = 'DECRYPTED. ROUTING...';
                this.classList.add('text-yellow-400');
                
                // Glitch effect before redirecting
                document.body.style.filter = "invert(100%) hue-rotate(180deg)";
                setTimeout(() => window.location.href = 'level3', 1200);
            }
        });
    </script>
<footer style="position: fixed; bottom: 0; left: 0; right: 0; text-align: center; padding: 8px; font-family: sans-serif; font-size: 0.8rem; color: white; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 9998; pointer-events: auto;">
    Developed by <a href="https://janiruhansaga.com/" target="_blank" style="color: #FFD700; text-decoration: none; font-weight: bold;">JAniruhansaga</a>
</footer>
</body>
</html>
