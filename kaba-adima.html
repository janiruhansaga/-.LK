<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hagga Jaggata - Avurudu Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Sinhala', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(to bottom, #38bdf8, #bae6fd);
        }
        
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .btn-pull {
            transition: transform 0.05s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-pull:active {
            transform: scale(0.9) translateY(5px);
            box-shadow: 0 0px 0px rgba(0,0,0,0.5) !important;
        }

        /* Power Bar Progress */
        .progress-bar {
            transition: width 0.1s linear;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body>
    <a href="index" style="position: absolute; top: 16px; left: 16px; z-index: 9999; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,215,0,0.4); color: #FFD700; padding: 8px 16px; border-radius: 50px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-family: sans-serif; cursor: pointer; transition: background 0.3s;" onmouseover="this.style.background='rgba(255,215,0,0.2)'" onmouseout="this.style.background='rgba(0,0,0,0.7)'">
        ◀ මෙනුව
    </a>
<div class="game-container" id="mainContainer">
    
    <!-- Kai -->
    <div class="absolute top-4 w-full text-center z-10 pointer-events-none">
        <h1 class="text-4xl md:text-6xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] tracking-wide">
            Hagga Jaggata <br><span class="text-2xl text-yellow-300">(කඹ ඇදීම)</span>
        </h1>
    </div>

    <!-- Nuna Ƙarfin UI -->
    <div class="absolute top-20 w-full max-w-lg px-4 z-10">
        <div class="glass-panel p-2 flex items-center justify-between font-bold text-white drop-shadow-md">
            <span class="text-green-300 ml-2">ඔබ (You)</span>
            <span class="text-red-300 mr-2">ප්‍රතිවාදියා (Bot)</span>
        </div>
        <div class="w-full h-6 bg-gray-900/60 rounded-full mt-2 border-2 border-white/50 relative overflow-hidden">
            <!-- Tsakiyar Layi -->
            <div class="absolute left-1/2 top-0 bottom-0 w-1 bg-white z-10 -ml-0.5"></div>
            <!-- Alamar -->
            <div id="ropeMarker" class="absolute top-0 bottom-0 w-4 bg-yellow-400 rounded-full shadow-[0_0_10px_yellow] transition-all duration-75 z-20" style="left: 50%; transform: translateX(-50%);"></div>
            <!-- Yankin Dan Wasa -->
            <div class="absolute left-0 top-0 bottom-0 bg-gradient-to-r from-green-500 to-green-400 opacity-50" style="width: 50%;"></div>
            <!-- Yankin Bot -->
            <div class="absolute right-0 top-0 bottom-0 bg-gradient-to-l from-red-500 to-red-400 opacity-50" style="width: 50%;"></div>
        </div>
    </div>

    <!-- Filin Wasa -->
    <div class="absolute inset-0 w-full h-full -z-10">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Wurin Jan Button -->
    <div class="absolute bottom-10 w-full flex justify-center z-20 px-4 pointer-events-none">
        <button id="btnPull" style="display: none;" class="pointer-events-auto btn-pull bg-gradient-to-b from-green-400 to-green-600 text-white py-4 px-12 md:px-24 rounded-3xl font-black text-4xl shadow-[0_10px_0_#166534,0_15px_20px_rgba(0,0,0,0.4)] border-2 border-green-300">
            Ja! (අදින්න) 💪
        </button>
    </div>

    <!-- Fara/Matsalar Allon -->
    <div id="startScreen" class="absolute inset-0 glass-panel bg-black/80 flex flex-col items-center justify-center z-50">
        <h1 class="text-5xl md:text-7xl font-black text-white mb-4 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] text-center">කඹ ඇදීම</h1>
        <p class="text-xl md:text-2xl text-yellow-300 mb-8 font-bold drop-shadow-md">මට්ටම තෝරන්න (Select Difficulty)</p>
        <div class="flex flex-col md:flex-row gap-4">
            <button onclick="startGame('easy')" class="px-8 py-4 bg-gradient-to-r from-green-400 to-green-600 text-white font-bold text-2xl rounded-full shadow-[0_8px_0_#166534] hover:translate-y-2 hover:shadow-[0_0px_0_#166534] transition-all border-2 border-white">පහසු (Easy)</button>
            <button onclick="startGame('medium')" class="px-8 py-4 bg-gradient-to-r from-yellow-400 to-yellow-600 text-white font-bold text-2xl rounded-full shadow-[0_8px_0_#854d0e] hover:translate-y-2 hover:shadow-[0_0px_0_#854d0e] transition-all border-2 border-white">සාමාන්‍ය (Medium)</button>
            <button onclick="startGame('hard')" class="px-8 py-4 bg-gradient-to-r from-red-400 to-red-600 text-white font-bold text-2xl rounded-full shadow-[0_8px_0_#991b1b] hover:translate-y-2 hover:shadow-[0_0px_0_#991b1b] transition-all border-2 border-white">අසීරු (Hard)</button>
        </div>
    </div>

    <!-- Allon Sakamako -->
    <div id="gameOverScreen" class="absolute inset-0 glass-panel bg-black/80 hidden flex-col items-center justify-center z-40">
        <h2 id="resultTitle" class="text-5xl md:text-7xl font-black text-white mb-2 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] text-center">ඔබ ජයග්‍රහණය කළා!</h2>
        <p id="resultSub" class="text-xl md:text-2xl text-yellow-300 font-bold mb-8 drop-shadow-md text-center">සුපිරි ගැම්මක්!</p>
        
        <button onclick="startGame()" class="px-8 py-4 bg-gradient-to-r from-orange-500 to-red-600 text-white font-bold text-2xl rounded-full shadow-[0_8px_15px_rgba(0,0,0,0.4)] hover:scale-105 transition-transform active:scale-95 border-2 border-white">
            නැවත අරඹන්න 🔄
        </button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const ropeMarkerUI = document.getElementById('ropeMarker');
    const btnPull = document.getElementById('btnPull');
    const screenGameOver = document.getElementById('gameOverScreen');
    const startScreen = document.getElementById('startScreen');
    const txtResult = document.getElementById('resultTitle');
    const txtSubResult = document.getElementById('resultSub');

    // Mabuɗan Wasa
    let gameState = 'start'; // start, playing, gameover
    let ropePosition = 0; // -100 (Bot wins) to 100 (Player wins)
    let botStrength = 0.4; // Base pulling power of bot
    let cameraShake = 0;
    let particles = [];
    let currentDifficulty = 'medium';

    // Samfurin Sauti 
    // Muna duba cewa idan sautunan basu loda ba zamu ci gaba da wasa
    let audioBGM = null;
    let audioCheer = null;
    let audioCreak = null;
    let winEffect = null;
    
    try {
        audioBGM = new Audio('raban si.mp3'); 
        audioBGM.loop = true; audioBGM.volume = 0.4;
    } catch (e) {
        console.log("Audio loading failed", e);
    }

    // Girman Allo don zane
    let cw, ch;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cw = canvas.width;
        ch = canvas.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function startGame(difficulty = currentDifficulty) {
        // Stop any playing sounds
        if (audioBGM) { try { audioBGM.pause(); audioBGM.currentTime = 0; } catch(e){} }
        if (winEffect) { try { winEffect.pause(); winEffect.currentTime = 0; } catch(e){} }
        if (audioCheer) { try { audioCheer.pause(); audioCheer.currentTime = 0; } catch(e){} }

        currentDifficulty = difficulty;
        gameState = 'playing';
        ropePosition = 0;
        cameraShake = 0;
        particles = [];
        
        // Tsarin Wahala (saurin jan bot)
        if (difficulty === 'easy') botStrength = 0.15;
        else if (difficulty === 'medium') botStrength = 0.35;
        else if (difficulty === 'hard') botStrength = 0.65;
        
        startScreen.style.display = 'none';
        screenGameOver.style.display = 'none';
        btnPull.style.display = 'block';
        updateUI();

        // Fara BGM
        if (audioBGM) {
            try { 
                let playPromise = audioBGM.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("BGM play failed", error);
                    });
                }
            } catch(e) {
                console.log("BGM error", e);
            }
        }
    }

    function pullRope() {
        if (gameState !== 'playing') return;
        
        // Dan wasa yana jan hagu
        ropePosition += 4.5;
        cameraShake = 3; // Ƙara tasirin gani
        
        // Kunna Sautin Jan Igiyar
        if (audioCreak) {
            try { 
                if(audioCreak.paused) {
                    let playPromise = audioCreak.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.log("Creak play failed", error);
                        });
                    }
                }
            } catch(e){
                 console.log("Creak error", e);
            }
        }

        // Ƙura a kafafun 'yan wasa 6
        for(let i=0; i<6; i++) {
            spawnDust(cw/2 - 100 - (i * 65) + (ropePosition * 1.5), ch/2 + 80);
        }

        checkWinCondition();
    }

    function botPull() {
        if (gameState !== 'playing') return;

        // Bot yana jan dama
        let dynamicStrength = botStrength;
        if (ropePosition > 50) dynamicStrength *= 1.5; 
        if (ropePosition < -50) dynamicStrength *= 0.8; 
        
        ropePosition -= dynamicStrength;
        
        // Ƙura ga bot
        if(Math.random() < 0.2) {
            let randIndex = Math.floor(Math.random() * 6);
            spawnDust(cw/2 + 100 + (randIndex * 65) + (ropePosition * 1.5), ch/2 + 80);
        }

        checkWinCondition();
    }

    function checkWinCondition() {
        if (ropePosition >= 100) {
            endGame(true);
        } else if (ropePosition <= -100) {
            endGame(false);
        }
        updateUI();
    }

    function updateUI() {
        // Taswirar -100 zuwa 100 zuwa 0% zuwa 100%
        let percent = ((ropePosition * -1) + 100) / 2; // Juya don hagu shine dan wasa
        // Matse shi
        percent = Math.max(0, Math.min(100, percent));
        ropeMarkerUI.style.left = `${percent}%`;
    }

    function endGame(playerWon) {
        gameState = 'gameover';
        btnPull.style.display = 'none';
        
        // Kunna Sautin Murna
        if(audioCheer) {
            try { 
                let playPromise = audioCheer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Cheer play failed", error);
                    });
                }
            } catch(e){
                console.log("Cheer error", e);
            }
        }
        
        setTimeout(() => {
            screenGameOver.style.display = 'flex';
            if(playerWon) {
            try { 
                winEffect = new Audio('cele.mp3');
                winEffect.play(); 
            } catch(e) {}
            txtResult.innerText = "ඔබ ජයග්‍රහණය කළා! 🏆";
                txtResult.style.color = '#4ade80';
                txtSubResult.innerText = "සුපිරි ගැම්මක්!";
            } else {
                txtResult.innerText = "ඔබ පැරදුණා! 😭";
                txtResult.style.color = '#f87171';
                txtSubResult.innerText = "නැවත උත්සාහ කරන්න...";
            }
        }, 500);
    }

    // --- Ayyukan Zane ---

    function drawBackground() {
        // Sama yana karkashin css body background
        
        // Ƙasa
        const groundY = ch / 2 + 50;
        
        // Duwatsu
        ctx.fillStyle = '#1e40af'; // Duwatsu masu duhu
        ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(cw*0.3, groundY - 150); ctx.lineTo(cw*0.7, groundY); ctx.fill();
        ctx.fillStyle = '#1e3a8a';
        ctx.beginPath(); ctx.moveTo(cw*0.4, groundY); ctx.lineTo(cw*0.8, groundY - 100); ctx.lineTo(cw, groundY); ctx.fill();

        // Ciyawa
        ctx.fillStyle = '#65a30d'; // Kore
        ctx.fillRect(0, groundY - 20, cw, ch - groundY + 20);
        
        // Hanyar Ƙasa
        ctx.fillStyle = '#854d0e'; // Kasa
        ctx.beginPath();
        ctx.ellipse(cw/2, groundY + 40, cw * 0.8, 60, 0, 0, Math.PI*2);
        ctx.fill();

        // Layin Tsakiya
        ctx.fillStyle = '#fff';
        ctx.fillRect(cw/2 - 2, groundY, 4, 80);
        
        // Yankin Nasara
        ctx.fillStyle = '#facc15';
        ctx.fillRect(cw/2 - 150, groundY, 2, 80); // Layin nasarar dan wasa
        ctx.fillRect(cw/2 + 150, groundY, 2, 80); // Layin nasarar bot
    }

    function drawRopeAndCharacters() {
        const centerY = ch / 2;
        const scaleFactor = cw < 800 ? cw / 850 : 1;
        
        // Matsayin Igiyar Ganin
        const visualRopePos = ropePosition * (cw / 400); 
        const centerX = cw / 2 + visualRopePos;

        // Girgizawar Igiya
        let vibrateY = 0;
        if (gameState === 'playing') {
            vibrateY = (Math.random() - 0.5) * 3;
        }

        ctx.save();
        ctx.translate(cw/2, centerY);
        ctx.scale(scaleFactor, scaleFactor);
        ctx.translate(-cw/2, -centerY);

        // Zana 'yan wasa 6 kowace ƙungiya
        for(let i=5; i>=0; i--) {
            drawTeam(cw/2 - 100 - (i * 65) + visualRopePos/scaleFactor, centerY, true, i); // Ƙungiyar Dan Wasa
            drawTeam(cw/2 + 100 + (i * 65) + visualRopePos/scaleFactor, centerY, false, i); // Ƙungiyar Bot
        }

        // Igiya
        ctx.strokeStyle = '#713f12'; 
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-cw, centerY + vibrateY);
        ctx.lineTo(cw*2, centerY + vibrateY);
        ctx.stroke();

        // Siffar Igiya
        ctx.strokeStyle = '#a16207'; 
        ctx.lineWidth = 4;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(-cw, centerY + vibrateY);
        ctx.lineTo(cw*2, centerY + vibrateY);
        ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.restore();

        // Tufafin Tsakiya
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.roundRect(centerX - 10, centerY - 15 + vibrateY, 20, 30, 4);
        ctx.fill();
        
        // Wutsiyar Tufafi
        ctx.beginPath();
        ctx.moveTo(centerX, centerY + 10 + vibrateY);
        ctx.lineTo(centerX - 15, centerY + 30 + vibrateY);
        ctx.lineTo(centerX + 5, centerY + 25 + vibrateY);
        ctx.fill();
    }

    function drawTeam(x, y, isPlayer, index) {
        ctx.save();
        ctx.translate(x, y);
        
        const dir = isPlayer ? -1 : 1; // Hanyar jingina
        const leanAngle = (isPlayer ? ropePosition : -ropePosition) * 0.005; // Jingina baya
        
        // Ƙaramar sauyawa don kowane ɗan wasa ya yi kyau
        const animOffset = (gameState === 'playing') ? Math.sin(Date.now()/150 + index) * 0.05 : 0;
        const finalAngle = (0.3 * dir) - leanAngle + animOffset;

        ctx.rotate(finalAngle);

        // Jiki
        ctx.fillStyle = isPlayer ? '#2563eb' : '#dc2626'; 
        ctx.beginPath(); ctx.roundRect(-15, -40, 30, 60, 10); ctx.fill();

        // Kai
        ctx.fillStyle = '#fcd34d'; 
        ctx.beginPath(); ctx.arc(0, -60, 20, 0, Math.PI*2); ctx.fill();

        // Kambi
        ctx.fillStyle = isPlayer ? '#1e3a8a' : '#991b1b';
        ctx.beginPath(); ctx.arc(0, -65, 20, Math.PI, 0); ctx.fill();

        // Hannuwa suna jan
        ctx.strokeStyle = '#fcd34d';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, -30);
        ctx.lineTo(dir * 30, 0); 
        ctx.stroke();

        ctx.restore();
    }

    // --- Tasirin Ƙura ---

    function spawnDust(x, y) {
        for(let i=0; i<3; i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 20,
                y: y + (Math.random() - 0.5) * 10,
                vx: (Math.random() - 0.5) * 2,
                vy: -Math.random() * 2,
                life: 1,
                size: Math.random() * 8 + 4
            });
        }
    }

    function pullRope() {
        if (gameState !== 'playing') return;
        
        ropePosition += 3.5; 
        if(audioBGM) {
            try { 
                if(audioBGM.paused) audioBGM.play();
            } catch(e) {}
        }

        spawnDust(cw/2 - 80, ch/2 + 80);

        checkWinCondition();
    }

    function drawAndCleanParticles() {
        ctx.fillStyle = 'rgba(161, 98, 7, 0.5)'; // Launin Ƙura
        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.05;
            p.size += 0.2; // Kara girma
            
            if(p.life <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
    }

    // --- Kewayen Wasa ---

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Girgiza Allo
        ctx.save();
        if (cameraShake > 0) {
            let sx = (Math.random() - 0.5) * cameraShake;
            let sy = (Math.random() - 0.5) * cameraShake;
            ctx.translate(sx, sy);
            cameraShake *= 0.8;
            if (cameraShake < 0.5) cameraShake = 0;
        }

        drawBackground();
        drawRopeAndCharacters();
        drawAndCleanParticles();

        ctx.restore(); // Koma girgiza

        if (gameState === 'playing') {
            botPull();
        }

        requestAnimationFrame(gameLoop);
    }

    // --- Sarrafa Shigarwa ---
    
    // Hana zub da sau biyu akan wayar hannu
    btnPull.addEventListener('touchstart', (e) => {
        e.preventDefault();
        pullRope();
    }, {passive: false});

    btnPull.addEventListener('mousedown', (e) => {
        e.preventDefault();
        pullRope();
    });

    // Spacebar don ja (don yan wasan PC)
    document.addEventListener('keydown', (e) => {
        if(e.code === 'Space' && gameState === 'playing') {
            pullRope();
            
            // Tasirin danna maɓalli
            btnPull.style.transform = 'scale(0.9) translateY(5px)';
            btnPull.style.boxShadow = '0 0px 0px rgba(0,0,0,0.5)';
            setTimeout(() => {
                btnPull.style.transform = '';
                btnPull.style.boxShadow = '';
            }, 100);
        }
    });

    // FARA
    gameLoop();

</script>
